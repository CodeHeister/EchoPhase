{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "echophase.fullname" . }}-frontend
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
spec:
  rules:
  - host: {{ .Values.frontend.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "echophase.fullname" . }}-frontend
            port:
              number: {{ .Values.frontend.service.port }}
{{- end }}
