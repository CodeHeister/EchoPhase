apiVersion: v1
kind: Service
metadata:
  name: {{ include "echophase.fullname" . }}-ui
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
  - port: {{ .Values.ui.service.port }}
    targetPort: {{ .Values.ui.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "echophase.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
