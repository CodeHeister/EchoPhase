{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "echophase.fullname" . }}-valkey
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: {{ .Values.valkey.service.type }}
  ports:
  - port: {{ .Values.valkey.service.port }}
    targetPort: valkey
    protocol: TCP
    name: valkey
  selector:
    {{- include "echophase.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
{{- end }}
