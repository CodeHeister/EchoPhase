{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "echophase.fullname" . }}-valkey
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "echophase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "echophase.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
    spec:
      containers:
      - name: valkey
        image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
        imagePullPolicy: {{ include "echophase.imagePullPolicy" . }}
        command:
        - valkey-server
        - --requirepass
        - $(VALKEY_PASSWORD)
        ports:
        - containerPort: {{ .Values.valkey.service.port }}
          name: valkey
        env:
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "echophase.fullname" . }}-secrets
              key: VALKEY_PASSWORD
        volumeMounts:
        - name: valkey-data
          mountPath: /data
        {{- if .Values.valkey.healthcheck.enabled }}
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - -a
            - $(VALKEY_PASSWORD)
            - PING
          initialDelaySeconds: {{ .Values.valkey.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.valkey.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.valkey.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.valkey.healthcheck.failureThreshold }}
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - -a
            - $(VALKEY_PASSWORD)
            - PING
          initialDelaySeconds: {{ .Values.valkey.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.valkey.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.valkey.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.valkey.healthcheck.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.valkey.resources | nindent 10 }}
      volumes:
      - name: valkey-data
        {{- if .Values.valkey.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "echophase.fullname" . }}-valkey-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
