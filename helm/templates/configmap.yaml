apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echophase.fullname" . }}-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.echophase.env.ASPNETCORE_ENVIRONMENT | quote }}
  
  # PostgreSQL
  POSTGRES_HOST: {{ printf "%s-postgres" (include "echophase.fullname" .) | quote }}
  POSTGRES_PORT: {{ .Values.postgres.service.port | quote }}
  
  # Valkey
  VALKEY_HOST: {{ printf "%s-valkey" (include "echophase.fullname" .) | quote }}
  VALKEY_PORT: {{ .Values.valkey.service.port | quote }}
  
  # ScyllaDB
  SCYLLA_CLUSTER_NAME: {{ .Values.scylla.clusterName | quote }}
  SCYLLA_CONTACT_POINT: {{ printf "%s-scylla" (include "echophase.fullname" .) | quote }}
  SCYLLA_SEEDS: {{ printf "%s-scylla" (include "echophase.fullname" .) | quote }}
  SCYLLA_AUTO_BOOTSTRAP: {{ .Values.scylla.autoBootstrap | quote }}
  SCYLLA_KEYSPACE: {{ .Values.scylla.keyspace | quote }}
