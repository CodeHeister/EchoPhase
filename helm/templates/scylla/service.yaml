{{- if .Values.scylla.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "echophase.fullname" . }}-scylla
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
    app.kubernetes.io/component: scylla
spec:
  clusterIP: None
  ports:
  - port: {{ .Values.scylla.service.port }}
    targetPort: cql
    protocol: TCP
    name: cql
  selector:
    {{- include "echophase.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scylla
{{- end }}
