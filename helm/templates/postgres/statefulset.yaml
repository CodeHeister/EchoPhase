{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "echophase.fullname" . }}-postgres
  labels:
    {{- include "echophase.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  serviceName: {{ include "echophase.fullname" . }}-postgres
  selector:
    matchLabels:
      {{- include "echophase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "echophase.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ include "echophase.imagePullPolicy" . }}
        ports:
        - containerPort: {{ .Values.postgres.service.port }}
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "echophase.fullname" . }}-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "echophase.fullname" . }}-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ include "echophase.fullname" . }}-secrets
              key: POSTGRES_DB
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        {{- if .Values.postgres.healthcheck.enabled }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER"
          initialDelaySeconds: {{ .Values.postgres.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.postgres.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.postgres.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.postgres.healthcheck.failureThreshold }}
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER"
          initialDelaySeconds: {{ .Values.postgres.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.postgres.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.postgres.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.postgres.healthcheck.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
      {{- if not .Values.postgres.persistence.enabled }}
      volumes:
      - name: postgres-data
        emptyDir: {}
      {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
      annotations:
        helm.sh/resource-policy: keep
    spec:
      accessModes:
      - ReadWriteOnce
      {{- if .Values.postgres.persistence.storageClass }}
      storageClassName: {{ .Values.postgres.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end }}
