# Global settings
global:
  imagePullPolicy: IfNotPresent
  storageClass: ""

# Registry configuration
imageRegistry: localhost:5000

# EchoPhase Backend
echophase:
  image:
    repository: echophase-backend
    tag: latest
    pullPolicy: IfNotPresent
  
  replicas: 1
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  healthcheck:
    enabled: true
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 5
  
  logs:
    enabled: true
    size: 1Gi
  
  # Environment variables
  env:
    ASPNETCORE_ENVIRONMENT: Production
    POSTGRES_HOST: "{{ .Release.Name }}-postgres"
    POSTGRES_PORT: "5432"
    SCYLLA_CLUSTER_NAME: echophase
    SCYLLA_CONTACT_POINT: "{{ .Release.Name }}-scylla"
    SCYLLA_SEEDS: "{{ .Release.Name }}-scylla"
    SCYLLA_AUTO_BOOTSTRAP: "1"
    SCYLLA_KEYSPACE: echophase
    VALKEY_HOST: "{{ .Release.Name }}-valkey"
    VALKEY_PORT: "6379"

# EchoPhase Frontend
frontend:
  image:
    repository: echophase-frontend
    tag: latest
    pullPolicy: IfNotPresent
  
  replicas: 1
  
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80

  ingress:
    enabled: true
    host: localhost
    tls: false
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Database Migration Job
migrate:
  enabled: true
  image:
    repository: echophase
    tag: latest
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# PostgreSQL
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17"
  
  service:
    type: ClusterIP
    port: 5432
  
  persistence:
    enabled: true
    size: 10Gi
  
  auth:
    username: echophase
    password: qwerty123
    database: echophase
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  healthcheck:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5

# Valkey (Redis)
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: latest
  
  service:
    type: ClusterIP
    port: 6379
  
  persistence:
    enabled: true
    size: 5Gi
  
  auth:
    password: qwerty123
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  healthcheck:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 5

# ScyllaDB
scylla:
  enabled: true
  image:
    repository: scylladb/scylla
    tag: latest
  
  service:
    type: ClusterIP
    port: 9042
  
  persistence:
    enabled: true
    size: 20Gi
  
  auth:
    username: echophase
    password: qwerty123
  
  clusterName: echophase
  keyspace: echophase
  autoBootstrap: 1
  
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  
  healthcheck:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

# Network
networkPolicy:
  enabled: false

# Secrets - override these in production!
secrets:
  POSTGRES_USER: echophase
  POSTGRES_PASSWORD: qwerty123
  POSTGRES_DB: echophase
  VALKEY_PASSWORD: qwerty123
  SCYLLA_USERNAME: echophase
  SCYLLA_PASSWORD: qwerty123
