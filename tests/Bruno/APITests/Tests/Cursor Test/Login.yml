info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |2-
        {
          "username": "{{username}}",
          "password": "{{password}}"
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 2xx", () => {
            expect(res.getStatus()).to.be.within(200, 299);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
