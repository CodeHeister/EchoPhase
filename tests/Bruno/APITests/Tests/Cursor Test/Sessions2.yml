info:
  name: Sessions2
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/auth/refresh/sessions?limit=1&after={{after}}"
  params:
    - name: limit
      value: "1"
      type: query
    - name: after
      value: "{{after}}"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["NextCursor"]
        method: jsonq
      variable:
        name: after
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
