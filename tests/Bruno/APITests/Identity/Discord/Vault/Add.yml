info:
  name: Add
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/discord/vault"
  headers:
    - name: X-CSRF-TOKEN
      value: "{{X-CSRF-TOKEN}}"
  body:
    type: json
    data: |-
      {
        Name: "{{DiscordKeyName}}",
        Value: "{{DiscordToken}}" 
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
