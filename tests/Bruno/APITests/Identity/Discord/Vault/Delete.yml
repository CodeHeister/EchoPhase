      value: "{{X-CSRF-TOKEN}}"
  body:
    type: json
    data: |-
      {
        "Name": "{{DiscordKeyName}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
