info:
  name: Jwt
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/jwt/{{Id}}"
  headers:
    - name: X-CSRF-TOKEN
      value: "{{X-CSRF-TOKEN}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = bru.getVar("Id");
        const token = res.getBody()[id];
        if (token)
        {
          bru.setVar("Bearer", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
