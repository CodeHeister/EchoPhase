info:
  name: Me
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/auth/me"
  headers:
    - name: X-CSRF-TOKEN
      value: "{{X-CSRF-TOKEN}}"
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["Id"]
        method: jsonq
      variable:
        name: Id
        scope: runtime
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["UserName"]
        method: jsonq
      variable:
        name: UserName
        scope: runtime
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["Name"]
        method: jsonq
      variable:
        name: Name
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
