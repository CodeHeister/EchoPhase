info:
  name: Registration
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |2-
        {
          "name": "{{name}}",
          "username": "{{username}}",
          "password": "{{password}}"
        }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.headers["x-csrf-token"]
        method: jsonq
      variable:
        name: X-CSRF-TOKEN
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
