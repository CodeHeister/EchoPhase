info:
  name: Refresh
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  body:
    type: json
    data: |-
      {
        "RefreshId": "{{RefreshId}}",
        "RefreshToken": "{{RefreshToken}}"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["accessToken"]
        method: jsonq
      variable:
        name: AccessToken
        scope: runtime
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body["refreshToken"]
        method: jsonq
      variable:
        name: RefreshToken
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
